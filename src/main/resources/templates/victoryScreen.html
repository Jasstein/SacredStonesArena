<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Victory Screen</title>
  <style>
    body {font-family: Arial, sans-serif; text-align: center;}
  </style>
</head>
<body>
<div class="container">
  <div class="imgContainer">
    <div><img th:src="${unitSrc}" th:alt="${unit}"></div>
  </div>
  <h1 class="header" th:text="${message}"></h1>
  <div>
    <form th:action="@{/}" method="post">
        <div class="advance"><button type="submit" name="action" th:value="reset">Reset</button></div>
    </form>
  </div>
</div>
</body>
</html>
